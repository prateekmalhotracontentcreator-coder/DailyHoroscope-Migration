# render.yaml — Infrastructure-as-Code for EverydayHoroscope.in
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Go to Render Dashboard → "Blueprints" → "New Blueprint Instance"
#   2. Connect this repo — Render will read this file automatically
#   3. Fill in the secret env vars marked (sync: false) in the Render UI
#   4. Click Deploy
#
# On every push to main, Render auto-redeploys the service.

services:
  - type: web
    name: everydayhoroscope-backend
    runtime: docker                # uses backend/Dockerfile
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore              # closest to India / lowest latency for your users
    plan: starter                  # upgrade to Standard when you need always-on + more RAM
    branch: main
    healthCheckPath: /api/health   # Render pings this; returns 200 = service is healthy
    autoDeploy: true

    envVars:
      # ── Non-secret / safe to commit ────────────────────────────────────
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"

      # ── Email via Resend HTTP API ───────────────────────────────────────
      # server.py calls https://api.resend.com/emails directly using httpx.
      # It does NOT use SMTP — so no SMTP_HOST / SMTP_PORT / SMTP_USER needed.
      #
      # RESEND_API_KEY  → the re_... key from your Resend dashboard (secret)
      # FROM_EMAIL      → the verified sender address, e.g. hello@everydayhoroscope.in
      # ADMIN_EMAIL     → where new-registration & contact-form alerts are sent
      #                   (server.py falls back to SMTP_USER if this is absent,
      #                    so we set ADMIN_EMAIL explicitly instead)
      - key: RESEND_API_KEY
        sync: false                # secret — enter re_... value in Render dashboard
      - key: FROM_EMAIL
        sync: false                # e.g. hello@everydayhoroscope.in (must be verified in Resend)
      - key: ADMIN_EMAIL
        value: "prateekmalhotra.contentcreator@gmail.com"   # safe to commit

      # ── Secrets: set these in the Render dashboard, NOT here ───────────
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false                # e.g. https://everydayhoroscope.in
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
