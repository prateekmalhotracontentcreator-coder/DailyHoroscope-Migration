# render.yaml — Infrastructure-as-Code for EverydayHoroscope.in
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Go to Render Dashboard → "Blueprints" → "New Blueprint Instance"
#   2. Connect this repo — Render will read this file automatically
#   3. Fill in the secret env vars marked (sync: false) in the Render UI
#      (MONGO_URL, JWT_SECRET, GOOGLE_CLIENT_ID, etc.)
#   4. Click Deploy
#
# On every push to main, Render auto-redeploys the service.

services:
  - type: web
    name: everydayhoroscope-backend
    runtime: docker                # uses backend/Dockerfile
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore              # closest to India / lowest latency for your users
    plan: starter                  # upgrade to Standard when you need always-on + more RAM
    branch: main
    healthCheckPath: /api/health   # Render pings this; returns 200 = service is healthy
    autoDeploy: true

    envVars:
      # ── Non-secret / safe to commit ────────────────────────────────────
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"

      # ── Secrets: set these in the Render dashboard, NOT here ───────────
      # These placeholders tell Render the variable names exist;
      # the actual values must be entered manually in Environment → Secret Files.
      - key: MONGO_URL
        sync: false                # secret — enter value in Render dashboard
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false                # e.g. https://everydayhoroscope.in
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
